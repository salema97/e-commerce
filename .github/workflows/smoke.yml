name: Smoke E2E

on:
  workflow_dispatch:
  push:
    branches: [main, 'feat/**']

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_JWT_ACCESS_SECRET: test-jwt-secret-minimum-32-characters!!
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      CI: true
      PLAYWRIGHT_FORCE_FRESH_SERVER: '1'

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm --filter @repo/shared-types build && pnpm --filter @repo/shared-utils build && pnpm --filter @repo/api-client build
      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate
      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install chromium --with-deps
      - name: Run smoke tests
        working-directory: apps/web
        run: pnpm exec playwright test e2e/smoke.spec.ts
