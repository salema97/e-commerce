name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTH_JWT_ACCESS_SECRET: test-jwt-secret-minimum-32-characters!!
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce
  REDIS_URL: redis://localhost:6379
  NODE_ENV: test
  CI: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Build packages
        run: pnpm --filter @repo/shared-types build && pnpm --filter @repo/shared-utils build && pnpm --filter @repo/api-client build

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate

      - name: API unit tests
        run: pnpm --filter @repo/api test

      - name: API e2e tests
        run: pnpm --filter @repo/api test:e2e

      - name: Shared utils tests
        run: pnpm --filter @repo/shared-utils test

      - name: Web unit tests
        run: pnpm --filter @repo/web test

      - name: Mobile unit tests
        run: pnpm --filter @repo/mobile test

      - name: Web typecheck
        run: pnpm --filter @repo/web typecheck

      - name: Mobile typecheck
        run: pnpm --filter @repo/mobile typecheck

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_JWT_ACCESS_SECRET: test-jwt-secret-minimum-32-characters!!
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecommerce
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      CI: true
      PLAYWRIGHT_FORCE_FRESH_SERVER: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @repo/shared-types build && pnpm --filter @repo/shared-utils build && pnpm --filter @repo/api-client build

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install chromium --with-deps

      - name: Playwright smoke + checkout
        working-directory: apps/web
        run: pnpm exec playwright test e2e/smoke.spec.ts e2e/checkout.spec.ts
